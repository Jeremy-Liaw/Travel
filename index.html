<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook GitHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Iansui&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0d0f;
    --panel: #17171a;
    --panel-alt: #1f1f23;
    --border: #2d2d32;
    --border-bright: #3e3e45;
    --text: #eceef0;
    --muted: #8d8d94;
    --dim: #55555c;
    --accent: #FFCE38;
    --accent-ink: #1a1608;
    --danger: #e6685f;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Inter', sans-serif;
    --font-iansui: 'Iansui', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font-body);
    height:100vh; overflow:hidden;
  }
  button, input, textarea, select{font-family:inherit;}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border-bright); border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::selection{background:#6b5416; color:var(--text);}

  .app{display:flex; height:100vh;}

  /* ---------- sidebar ---------- */
  .sidebar{
    width:250px; flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    padding:18px 14px;
  }
  .sidebar-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .app-title{font-family:var(--font-display); font-weight:700; font-size:16px;}
  .sync-badge{
    font-family:var(--font-mono); font-size:10px; color:var(--dim);
    display:flex; align-items:center; gap:5px; letter-spacing:0.04em;
  }
  .sync-dot{width:6px;height:6px;border-radius:50%; background:var(--muted); flex-shrink:0;}
  .sync-dot.saved{background:var(--accent); box-shadow:0 0 6px var(--accent); animation:blip 0.9s ease;}
  @keyframes blip{0%{transform:scale(1.6);} 100%{transform:scale(1);}}

  .section-label{
    font-family:var(--font-mono); font-size:10px; color:var(--dim);
    letter-spacing:0.1em; text-transform:uppercase; margin:14px 0 8px 4px;
  }
  .project-list, .folder-list{display:flex; flex-direction:column; gap:2px;}
  .side-item{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    padding:8px 10px; border-radius:5px; cursor:pointer;
    font-size:13px; color:var(--muted);
    border:1px solid transparent;
  }
  .side-item:hover{background:var(--panel-alt); color:var(--text);}
  .side-item.active{background:var(--panel-alt); color:var(--accent); border-color:var(--border-bright);}
  .side-item .label{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .side-item .del-x{opacity:0; font-size:13px; color:var(--dim); flex-shrink:0;}
  .side-item:hover .del-x{opacity:1;}
  .side-item .del-x:hover{color:var(--danger);}

  .add-btn{
    display:flex; align-items:center; gap:6px;
    background:none; border:1px dashed var(--border-bright);
    color:var(--dim); font-size:12px; font-family:var(--font-mono);
    padding:8px 10px; border-radius:5px; cursor:pointer; margin-top:6px;
    width:100%; text-align:left;
  }
  .add-btn:hover{color:var(--accent); border-color:var(--accent);}

  .folders-block{margin-top:6px; flex:1; overflow-y:auto;}

  /* ---------- main ---------- */
  .main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .main-header{
    padding:20px 28px 14px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    flex-wrap:wrap;
  }
  .main-title{font-family:var(--font-display); font-weight:700; font-size:20px;}
  .main-sub{font-family:var(--font-mono); font-size:11px; color:var(--dim); margin-top:4px;}
  .new-note-btn{
    background:var(--accent); color:var(--accent-ink); border:none;
    font-weight:700; font-size:13px; padding:10px 18px; border-radius:6px; cursor:pointer;
    font-family:var(--font-mono); letter-spacing:0.02em;
  }
  .new-note-btn:hover{filter:brightness(1.08);}

  .tag-filter-row{
    display:flex; gap:8px; flex-wrap:wrap; padding:14px 28px 0;
  }
  .tag-chip{
    font-family:var(--font-mono); font-size:11px; color:var(--muted);
    border:1px solid var(--border); padding:5px 10px; border-radius:12px; cursor:pointer;
  }
  .tag-chip:hover{border-color:var(--border-bright); color:var(--text);}
  .tag-chip.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}

  .note-grid{
    flex:1; overflow-y:auto; padding:20px 28px 40px;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:14px;
    align-content:start;
  }
  .note-card{
    background:var(--panel); border:1px solid var(--border);
    border-left:4px solid var(--card-color, var(--accent));
    border-radius:7px; padding:14px 16px; cursor:pointer;
    display:flex; flex-direction:column; gap:8px;
    transition:border-color .15s ease;
  }
  .note-card:hover{border-color:var(--border-bright);}
  .note-card-title{font-family:var(--font-display); font-weight:700; font-size:14px;}
  .note-card-body{
    font-size:13px; color:var(--muted); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .note-card-tags{display:flex; gap:6px; flex-wrap:wrap;}
  .mini-tag{
    font-family:var(--font-mono); font-size:10px; color:var(--dim);
    background:var(--panel-alt); padding:2px 7px; border-radius:8px;
  }
  .note-card-meta{font-family:var(--font-mono); font-size:10px; color:var(--dim); margin-top:2px;}

  .empty-state{
    grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--dim);
    font-family:var(--font-mono); font-size:13px;
  }

  /* ---------- editor panel ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none;
    align-items:center; justify-content:center; z-index:100;
    padding:24px;
  }
  .overlay.show{display:flex;}
  .editor-panel{
    width:560px; max-width:92vw; max-height:88vh; background:var(--panel);
    border:1px solid var(--border-bright); border-radius:10px;
    padding:28px; display:flex; flex-direction:column; gap:16px; overflow-y:auto;
  }
  .editor-row{display:flex; flex-direction:column; gap:6px;}
  .editor-row label{
    font-family:var(--font-mono); font-size:11px; color:var(--dim); letter-spacing:0.05em;
  }
  .editor-row input[type=text], .editor-row textarea, .editor-row select{
    background:var(--bg); border:1px solid var(--border-bright); color:var(--text);
    padding:10px 12px; border-radius:5px; font-size:14px;
  }
  .editor-row textarea{min-height:280px; resize:vertical; line-height:1.6; font-family:var(--font-body);}
  .editor-row input:focus, .editor-row textarea:focus, .editor-row select:focus{
    outline:2px solid var(--accent); outline-offset:1px;
  }
  .color-swatches{display:flex; gap:8px; flex-wrap:wrap;}
  .swatch{
    width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  }
  .swatch.selected{border-color:var(--text);}
  .editor-actions{display:flex; justify-content:space-between; gap:10px; margin-top:6px;}
  .save-btn{
    background:var(--accent); color:var(--accent-ink); border:none; font-weight:700;
    font-family:var(--font-iansui); font-size:15px; padding:10px 18px; border-radius:6px; cursor:pointer;
    flex:1;
  }
  .save-btn:hover{filter:brightness(1.08);}
  .cancel-btn, .delete-btn{
    background:none; border:1px solid var(--border-bright); color:var(--muted);
    font-family:var(--font-mono); font-size:12px; padding:10px 16px; border-radius:6px; cursor:pointer;
  }
  .delete-btn:hover{color:var(--danger); border-color:var(--danger);}
  .cancel-btn:hover{color:var(--text);}
  .panel-close-row{display:flex; justify-content:flex-end;}
  .panel-close{background:none; border:none; color:var(--dim); font-size:20px; cursor:pointer;}
  .panel-close:hover{color:var(--text);}

  .loading-screen{
    position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:13px; color:var(--dim); z-index:200;
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">正在連線至 GitHub...</div>

<div class="loading-screen" id="setupScreen" style="display:none; flex-direction:column; gap:16px;">
  <div style="width:360px; max-width:90vw; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:28px; text-align:left;">
    <div style="font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--text); margin-bottom:4px;">連接 GitHub</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--dim); margin-bottom:18px; line-height:1.6;">
      這些設定只會存在這台電腦的瀏覽器裡，不會上傳到任何 repo。
    </div>
    <input type="text" id="ghOwner" placeholder="GitHub 帳號名稱（owner）" style="width:100%; background:var(--bg); border:1px solid var(--border-bright); color:var(--text); padding:10px 12px; border-radius:5px; margin-bottom:8px; font-size:13px;">
    <input type="text" id="ghRepo" placeholder="repo 名稱（例如 notebook-data）" style="width:100%; background:var(--bg); border:1px solid var(--border-bright); color:var(--text); padding:10px 12px; border-radius:5px; margin-bottom:8px; font-size:13px;">
    <input type="text" id="ghPath" placeholder="檔案路徑" value="notebook-data.json" style="width:100%; background:var(--bg); border:1px solid var(--border-bright); color:var(--text); padding:10px 12px; border-radius:5px; margin-bottom:8px; font-size:13px;">
    <input type="text" id="ghBranch" placeholder="分支" value="main" style="width:100%; background:var(--bg); border:1px solid var(--border-bright); color:var(--text); padding:10px 12px; border-radius:5px; margin-bottom:8px; font-size:13px;">
    <input type="password" id="ghToken" placeholder="Personal Access Token" style="width:100%; background:var(--bg); border:1px solid var(--border-bright); color:var(--text); padding:10px 12px; border-radius:5px; margin-bottom:14px; font-size:13px;">
    <button id="ghConnectBtn" style="width:100%; background:var(--accent); color:var(--accent-ink); border:none; font-weight:700; font-family:var(--font-iansui); font-size:15px; padding:12px; border-radius:6px; cursor:pointer;">連接並載入筆記</button>
    <div id="ghError" style="display:none; margin-top:12px; font-family:var(--font-mono); font-size:12px; color:var(--danger); line-height:1.6;"></div>
  </div>
</div>

<div class="app" id="app" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <span class="app-title">Notebook</span>
      <span class="sync-badge"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">已同步至 GitHub</span></span>
    </div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--dim); margin-bottom:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" id="currentRepoLabel"></div>
    <button class="add-btn" id="disconnectBtn" style="border-color:var(--border); color:var(--dim);">中斷連線</button>
    <div class="section-label">專案</div>
    <div class="project-list" id="projectList"></div>
    <button class="add-btn" id="addProjectBtn">+ 新增專案</button>

    <div class="folders-block" id="foldersBlock" style="display:none;">
      <div class="section-label">資料夾</div>
      <div class="folder-list" id="folderList"></div>
      <button class="add-btn" id="addFolderBtn">+ 新增資料夾</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="mainTitle">選擇一個專案</div>
        <div class="main-sub" id="mainSub"></div>
      </div>
      <button class="new-note-btn" id="newNoteBtn" style="display:none;">+ 新增筆記</button>
    </div>
    <div class="tag-filter-row" id="tagFilterRow"></div>
    <div class="note-grid" id="noteGrid"></div>
  </div>
</div>

<!-- EDITOR OVERLAY -->
<div class="overlay" id="overlay">
  <div class="editor-panel">
    <div class="panel-close-row"><button class="panel-close" id="panelCloseBtn">×</button></div>
    <div class="editor-row">
      <label>標題</label>
      <input type="text" id="editTitle" placeholder="筆記標題">
    </div>
    <div class="editor-row">
      <label>內容</label>
      <textarea id="editBody" placeholder="寫點什麼..."></textarea>
    </div>
    <div class="editor-row">
      <label>標籤（用逗號分隔）</label>
      <input type="text" id="editTags" placeholder="例如: 齒輪, 待辦, 靈感">
    </div>
    <div class="editor-row">
      <label>資料夾</label>
      <select id="editFolder"><option value="">（不放入資料夾）</option></select>
    </div>
    <div class="editor-row">
      <label>顏色</label>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <div class="editor-actions">
      <button class="delete-btn" id="deleteNoteBtn">刪除</button>
      <button class="cancel-btn" id="cancelEditBtn">取消</button>
      <button class="save-btn" id="saveNoteBtn">儲存</button>
    </div>
  </div>
</div>

<!-- MINI DIALOG (replaces native prompt/confirm popups) -->
<div class="overlay" id="miniDialogOverlay">
  <div class="editor-panel" style="width:320px; max-width:90vw; gap:14px;">
    <div id="miniDialogTitle" style="font-family:var(--font-display); font-weight:700; font-size:16px; color:var(--text); line-height:1.5;"></div>
    <div class="editor-row" id="miniDialogInputRow">
      <input type="text" id="miniDialogInput" placeholder="">
    </div>
    <div class="editor-actions">
      <button class="cancel-btn" id="miniDialogCancel">取消</button>
      <button class="save-btn" id="miniDialogConfirm">確定</button>
    </div>
  </div>
</div>

<script>
const CONFIG_KEY = 'notebook-github-config';
const COLORS = ['#FFCE38','#FF6B6B','#4D96FF','#6BCB77','#B983FF','#FF9F45','#5AD8A6','#8D8D94'];

let state = { projects: [], folders: [], notes: [] };
let currentProjectId = null;
let currentFolderId = null; // null = show all in project
let activeTagFilter = null;
let editingNoteId = null;

let ghConfig = null; // { owner, repo, path, branch, token }
let currentSha = null; // GitHub blob sha of the currently loaded file, null if file doesn't exist yet

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function b64EncodeUtf8(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64DecodeUtf8(b64){ return decodeURIComponent(escape(atob(b64.replace(/\n/g, '')))); }

function contentsUrl(){
  return `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`;
}

async function loadData(){
  const res = await fetch(`${contentsUrl()}?ref=${encodeURIComponent(ghConfig.branch)}`, {
    headers: {
      'Authorization': `Bearer ${ghConfig.token}`,
      'Accept': 'application/vnd.github+json'
    }
  });
  if(res.status === 404){
    state = { projects: [], folders: [], notes: [] };
    currentSha = null;
    return;
  }
  if(!res.ok){
    const body = await res.json().catch(() => ({}));
    throw new Error(`GitHub API 錯誤（${res.status}）：${body.message || res.statusText}`);
  }
  const json = await res.json();
  currentSha = json.sha;
  const text = json.content ? b64DecodeUtf8(json.content) : '';
  try{
    state = text.trim() ? JSON.parse(text) : { projects: [], folders: [], notes: [] };
  }catch(e){
    console.log('檔案內容不是有效的 JSON，將視為空白筆記本。', e);
    state = { projects: [], folders: [], notes: [] };
  }
}

async function saveData(){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  label.textContent = '儲存中...';
  try{
    const body = {
      message: `Update notebook data (${new Date().toISOString()})`,
      content: b64EncodeUtf8(JSON.stringify(state, null, 2)),
      branch: ghConfig.branch
    };
    if(currentSha) body.sha = currentSha;
    const res = await fetch(contentsUrl(), {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${ghConfig.token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const errBody = await res.json().catch(() => ({}));
      throw new Error(`GitHub API 錯誤（${res.status}）：${errBody.message || res.statusText}`);
    }
    const json = await res.json();
    currentSha = json.content.sha;
    label.textContent = '已同步至 GitHub';
    dot.classList.remove('saved');
    void dot.offsetWidth;
    dot.classList.add('saved');
  }catch(e){
    label.textContent = '儲存失敗';
    console.error('GitHub save error:', e);
  }
}

/* ---------------- rendering ---------------- */

function renderProjects(){
  const list = document.getElementById('projectList');
  list.innerHTML = '';
  state.projects.forEach(p => {
    const div = document.createElement('div');
    div.className = 'side-item' + (p.id === currentProjectId ? ' active' : '');
    div.innerHTML = `<span class="label"></span><span class="del-x">×</span>`;
    div.querySelector('.label').textContent = p.name;
    div.querySelector('.label').addEventListener('click', () => selectProject(p.id));
    div.querySelector('.del-x').addEventListener('click', async (e) => {
      e.stopPropagation();
      if(await showConfirm(`刪除專案「${p.name}」？裡面的資料夾和筆記也會一併刪除。`)){
        state.projects = state.projects.filter(x => x.id !== p.id);
        state.folders = state.folders.filter(f => f.projectId !== p.id);
        state.notes = state.notes.filter(n => n.projectId !== p.id);
        if(currentProjectId === p.id){ currentProjectId = null; currentFolderId = null; }
        saveData();
        renderAll();
      }
    });
    list.appendChild(div);
  });
}

function renderFolders(){
  const block = document.getElementById('foldersBlock');
  const list = document.getElementById('folderList');
  list.innerHTML = '';
  if(!currentProjectId){ block.style.display = 'none'; return; }
  block.style.display = 'block';

  const allItem = document.createElement('div');
  allItem.className = 'side-item' + (currentFolderId === null ? ' active' : '');
  allItem.innerHTML = `<span class="label">全部筆記</span>`;
  allItem.addEventListener('click', () => { currentFolderId = null; renderAll(); });
  list.appendChild(allItem);

  state.folders.filter(f => f.projectId === currentProjectId).forEach(f => {
    const div = document.createElement('div');
    div.className = 'side-item' + (f.id === currentFolderId ? ' active' : '');
    div.innerHTML = `<span class="label"></span><span class="del-x">×</span>`;
    div.querySelector('.label').textContent = f.name;
    div.querySelector('.label').addEventListener('click', () => { currentFolderId = f.id; renderAll(); });
    div.querySelector('.del-x').addEventListener('click', async (e) => {
      e.stopPropagation();
      if(await showConfirm(`刪除資料夾「${f.name}」？裡面的筆記會回到「全部筆記」。`)){
        state.folders = state.folders.filter(x => x.id !== f.id);
        state.notes.forEach(n => { if(n.folderId === f.id) n.folderId = null; });
        if(currentFolderId === f.id) currentFolderId = null;
        saveData();
        renderAll();
      }
    });
    list.appendChild(div);
  });
}

function renderHeader(){
  const title = document.getElementById('mainTitle');
  const sub = document.getElementById('mainSub');
  const newBtn = document.getElementById('newNoteBtn');
  if(!currentProjectId){
    title.textContent = '選擇或新增一個專案';
    sub.textContent = '';
    newBtn.style.display = 'none';
    return;
  }
  const proj = state.projects.find(p => p.id === currentProjectId);
  const folder = state.folders.find(f => f.id === currentFolderId);
  title.textContent = proj ? proj.name : '';
  sub.textContent = folder ? `資料夾：${folder.name}` : '全部筆記';
  newBtn.style.display = 'inline-block';
}

function getVisibleNotes(){
  if(!currentProjectId) return [];
  return state.notes.filter(n => {
    if(n.projectId !== currentProjectId) return false;
    if(currentFolderId !== null && n.folderId !== currentFolderId) return false;
    if(activeTagFilter && !(n.tags || []).includes(activeTagFilter)) return false;
    return true;
  });
}

function renderTagFilters(){
  const row = document.getElementById('tagFilterRow');
  row.innerHTML = '';
  if(!currentProjectId) return;
  const scoped = state.notes.filter(n => n.projectId === currentProjectId &&
    (currentFolderId === null || n.folderId === currentFolderId));
  const tagSet = new Set();
  scoped.forEach(n => (n.tags||[]).forEach(t => tagSet.add(t)));
  if(tagSet.size === 0) return;
  [...tagSet].sort().forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip' + (activeTagFilter === tag ? ' active' : '');
    chip.textContent = '#' + tag;
    chip.addEventListener('click', () => {
      activeTagFilter = (activeTagFilter === tag) ? null : tag;
      renderAll();
    });
    row.appendChild(chip);
  });
}

function renderNoteGrid(){
  const grid = document.getElementById('noteGrid');
  grid.innerHTML = '';
  if(!currentProjectId){
    grid.innerHTML = '<div class="empty-state">從左側新增一個專案開始使用</div>';
    return;
  }
  const notes = getVisibleNotes();
  if(notes.length === 0){
    grid.innerHTML = '<div class="empty-state">這裡還沒有筆記，按右上角「+ 新增筆記」開始寫。</div>';
    return;
  }
  notes.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0)).forEach(n => {
    const card = document.createElement('div');
    card.className = 'note-card';
    card.style.setProperty('--card-color', n.color || '#FFCE38');
    const d = n.updatedAt ? new Date(n.updatedAt) : new Date();
    const timeStr = d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
    card.innerHTML = `
      <div class="note-card-title"></div>
      <div class="note-card-body"></div>
      <div class="note-card-tags"></div>
      <div class="note-card-meta">${timeStr}</div>
    `;
    card.querySelector('.note-card-title').textContent = n.title || '（無標題）';
    card.querySelector('.note-card-body').textContent = n.body || '';
    const tagsWrap = card.querySelector('.note-card-tags');
    (n.tags||[]).forEach(t => {
      const s = document.createElement('span');
      s.className = 'mini-tag';
      s.textContent = '#' + t;
      tagsWrap.appendChild(s);
    });
    card.addEventListener('click', () => openEditor(n.id));
    grid.appendChild(card);
  });
}

function renderFolderSelectOptions(){
  const sel = document.getElementById('editFolder');
  sel.innerHTML = '<option value="">（不放入資料夾）</option>';
  state.folders.filter(f => f.projectId === currentProjectId).forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.id; opt.textContent = f.name;
    sel.appendChild(opt);
  });
}

function renderColorSwatches(selected){
  const wrap = document.getElementById('colorSwatches');
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (c === selected ? ' selected' : '');
    sw.style.background = c;
    sw.dataset.color = c;
    sw.addEventListener('click', () => {
      wrap.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected'));
      sw.classList.add('selected');
    });
    wrap.appendChild(sw);
  });
}

function renderAll(){
  renderProjects();
  renderFolders();
  renderHeader();
  renderTagFilters();
  renderNoteGrid();
}

/* ---------------- actions ---------------- */

function selectProject(id){
  currentProjectId = id;
  currentFolderId = null;
  activeTagFilter = null;
  renderAll();
}

function openEditor(noteId){
  editingNoteId = noteId;
  renderFolderSelectOptions();
  const deleteBtn = document.getElementById('deleteNoteBtn');
  if(noteId){
    const n = state.notes.find(x => x.id === noteId);
    document.getElementById('editTitle').value = n.title || '';
    document.getElementById('editBody').value = n.body || '';
    document.getElementById('editTags').value = (n.tags||[]).join(', ');
    document.getElementById('editFolder').value = n.folderId || '';
    renderColorSwatches(n.color || COLORS[0]);
    deleteBtn.style.display = 'inline-block';
  } else {
    document.getElementById('editTitle').value = '';
    document.getElementById('editBody').value = '';
    document.getElementById('editTags').value = '';
    document.getElementById('editFolder').value = currentFolderId || '';
    renderColorSwatches(COLORS[0]);
    deleteBtn.style.display = 'none';
  }
  document.getElementById('overlay').classList.add('show');
}

function closeEditor(){
  document.getElementById('overlay').classList.remove('show');
  editingNoteId = null;
}

function saveNoteFromEditor(){
  const title = document.getElementById('editTitle').value.trim();
  const body = document.getElementById('editBody').value.trim();
  const tags = document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const folderId = document.getElementById('editFolder').value || null;
  const selectedSwatch = document.querySelector('.swatch.selected');
  const color = selectedSwatch ? selectedSwatch.dataset.color : COLORS[0];

  if(!title && !body){ closeEditor(); return; }

  if(editingNoteId){
    const n = state.notes.find(x => x.id === editingNoteId);
    n.title = title; n.body = body; n.tags = tags; n.folderId = folderId; n.color = color;
    n.updatedAt = Date.now();
  } else {
    state.notes.push({
      id: uid(), projectId: currentProjectId, folderId, title, body, tags, color,
      updatedAt: Date.now()
    });
  }
  saveData();
  closeEditor();
  renderAll();
}


/* ---------------- mini dialog (replaces window.prompt / window.confirm) ---------------- */

function showPrompt(title, placeholder){
  return new Promise((resolve) => {
    const overlay = document.getElementById('miniDialogOverlay');
    const titleEl = document.getElementById('miniDialogTitle');
    const inputRow = document.getElementById('miniDialogInputRow');
    const input = document.getElementById('miniDialogInput');
    const confirmBtn = document.getElementById('miniDialogConfirm');
    const cancelBtn = document.getElementById('miniDialogCancel');

    titleEl.textContent = title;
    inputRow.style.display = 'flex';
    input.value = '';
    input.placeholder = placeholder || '';
    overlay.classList.add('show');
    setTimeout(() => input.focus(), 50);

    function cleanup(result){
      overlay.classList.remove('show');
      confirmBtn.removeEventListener('click', onConfirm);
      cancelBtn.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onConfirm(){ cleanup(input.value.trim() || null); }
    function onCancel(){ cleanup(null); }
    function onKey(e){
      if(e.key === 'Enter'){ onConfirm(); }
      if(e.key === 'Escape'){ onCancel(); }
    }
    confirmBtn.addEventListener('click', onConfirm);
    cancelBtn.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}

function showConfirm(message){
  return new Promise((resolve) => {
    const overlay = document.getElementById('miniDialogOverlay');
    const titleEl = document.getElementById('miniDialogTitle');
    const inputRow = document.getElementById('miniDialogInputRow');
    const confirmBtn = document.getElementById('miniDialogConfirm');
    const cancelBtn = document.getElementById('miniDialogCancel');

    titleEl.textContent = message;
    inputRow.style.display = 'none';
    overlay.classList.add('show');

    function cleanup(result){
      overlay.classList.remove('show');
      confirmBtn.removeEventListener('click', onConfirm);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(result);
    }
    function onConfirm(){ cleanup(true); }
    function onCancel(){ cleanup(false); }
    confirmBtn.addEventListener('click', onConfirm);
    cancelBtn.addEventListener('click', onCancel);
  });
}

/* ---------------- wiring ---------------- */

document.getElementById('addProjectBtn').addEventListener('click', async () => {
  const name = await showPrompt('新增專案', '專案名稱');
  if(!name) return;
  const p = { id: uid(), name: name.trim() };
  state.projects.push(p);
  saveData();
  selectProject(p.id);
});

document.getElementById('addFolderBtn').addEventListener('click', async () => {
  if(!currentProjectId) return;
  const name = await showPrompt('新增資料夾', '資料夾名稱');
  if(!name) return;
  const f = { id: uid(), projectId: currentProjectId, name: name.trim() };
  state.folders.push(f);
  saveData();
  currentFolderId = f.id;
  renderAll();
});

document.getElementById('disconnectBtn').addEventListener('click', async () => {
  if(await showConfirm('中斷與 GitHub 的連線？（不會刪除 repo 裡的資料，只是這台電腦要重新輸入設定）')){
    localStorage.removeItem(CONFIG_KEY);
    ghConfig = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
  }
});

document.getElementById('newNoteBtn').addEventListener('click', () => openEditor(null));
document.getElementById('panelCloseBtn').addEventListener('click', closeEditor);
document.getElementById('cancelEditBtn').addEventListener('click', closeEditor);
document.getElementById('saveNoteBtn').addEventListener('click', saveNoteFromEditor);
document.getElementById('overlay').addEventListener('click', (e) => {
  if(e.target.id === 'overlay') closeEditor();
});
document.getElementById('deleteNoteBtn').addEventListener('click', async () => {
  if(!editingNoteId) return;
  if(await showConfirm('確定要刪除這則筆記嗎？')){
    state.notes = state.notes.filter(n => n.id !== editingNoteId);
    saveData();
    closeEditor();
    renderAll();
  }
});

/* ---------------- connect flow ---------------- */

async function connectAndLoad(config){
  const errEl = document.getElementById('ghError');
  errEl.style.display = 'none';
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('loadingScreen').style.display = 'flex';
  document.getElementById('loadingScreen').textContent = '正在連線至 GitHub...';
  ghConfig = config;
  try{
    await loadData();
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    document.getElementById('currentRepoLabel').textContent = `${config.owner}/${config.repo}`;
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    currentProjectId = state.projects.length > 0 ? state.projects[0].id : null;
    currentFolderId = null; activeTagFilter = null;
    renderAll();
  }catch(e){
    ghConfig = null;
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

document.getElementById('ghConnectBtn').addEventListener('click', () => {
  const config = {
    owner: document.getElementById('ghOwner').value.trim(),
    repo: document.getElementById('ghRepo').value.trim(),
    path: document.getElementById('ghPath').value.trim() || 'notebook-data.json',
    branch: document.getElementById('ghBranch').value.trim() || 'main',
    token: document.getElementById('ghToken').value.trim()
  };
  if(!config.owner || !config.repo || !config.token){
    const errEl = document.getElementById('ghError');
    errEl.textContent = '帳號名稱、repo 名稱、Token 都是必填的。';
    errEl.style.display = 'block';
    return;
  }
  connectAndLoad(config);
});

/* ---------------- init ---------------- */

(function init(){
  const saved = localStorage.getItem(CONFIG_KEY);
  if(saved){
    try{
      const config = JSON.parse(saved);
      connectAndLoad(config);
      return;
    }catch(e){ /* fall through to setup screen */ }
  }
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
})();
</script>
